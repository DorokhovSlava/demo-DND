name: Deploy to GitHub Pages

# Для репозитория demo-DND, где ФРОНТ лежит В КОРНЕ (содержимое frontend/ скопировано в корень).
# Кладётся в demo-DND/.github/workflows/deploy.yml
#
# Бэкенд крутится локально и доступен через Cloudflare Tunnel; URL бэкенда фронт берёт
# из config.json в рантайме (public/config.json → dist/config.json), пересборка при смене URL не нужна.

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # project-page: https://dorokhovslava.github.io/demo-DND/  → база = "/demo-DND/" (регистр как в имени репо!)
      VITE_BASE: /demo-DND/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

      # SPA-fallback: 404.html = index.html (чинит deep-link/refresh при createWebHistory).
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
